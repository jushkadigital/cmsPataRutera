  # ── RabbitMQ Topology Extension ─────────────────────────────────────
  x-rabbitmq-topology:
    exchanges:
      - name: tourism.integration
        type: topic
        durable: true
        description: Integration events for cross-service communication
      - name: tourism.notify
        type: topic
        durable: true
        description: Notification events for user-facing messaging
      - name: identity.events
        type: topic
        durable: true
        description: Inbound events from external identity service
      - name: capacity.events
        type: topic
        durable: true
        description: Inbound events from external capacity service
      - name: tourism.dlx
        type: fanout
        durable: true
        description: Dead-letter exchange for failed messages

    queues:
      - name: search.integration.queue
        type: quorum
        durable: true
        bindings:
          - exchange: tourism.integration
            routingPatterns:
              - 'integration.tour.#'
              - 'integration.package.#'
        deadLetterExchange: tourism.dlx
        retryQueue:
          name: search.integration.queue.retry
          ttl: 30000
          deadLetterExchange: tourism.integration
          deadLetterRoutingKey: search.integration.queue
        dlq: search.integration.queue.dlq
        consumer: Search Indexer Service

      - name: email.notify.queue
        type: quorum
        durable: true
        bindings:
          - exchange: tourism.notify
            routingPatterns:
              - 'notify.#'
        deadLetterExchange: tourism.dlx
        retryQueue:
          name: email.notify.queue.retry
          ttl: 30000
          deadLetterExchange: tourism.notify
          deadLetterRoutingKey: email.notify.queue
        dlq: email.notify.queue.dlq
        consumer: Email Notification Service

      - name: webhook.notify.queue
        type: quorum
        durable: true
        bindings:
          - exchange: tourism.notify
            routingPatterns:
              - 'notify.#'
        deadLetterExchange: tourism.dlx
        retryQueue:
          name: webhook.notify.queue.retry
          ttl: 30000
          deadLetterExchange: tourism.notify
          deadLetterRoutingKey: webhook.notify.queue
        dlq: webhook.notify.queue.dlq
        consumer: Webhook Notification Service

      - name: payload.inbound.queue
        type: quorum
        durable: true
        bindings:
          - exchange: identity.events
            routingPatterns:
              - 'identity.user.created.#'
              - 'identity.user.deleted.#'
        deadLetterExchange: tourism.dlx
        retryQueue:
          name: payload.inbound.queue.retry
          ttl: 30000
          deadLetterExchange: identity.events
          deadLetterRoutingKey: payload.inbound.queue
         dlq: payload.inbound.queue.dlq
         consumer: Payload CMS (Inbound Handler)

      - name: payload.capacity.queue
        type: quorum
        durable: true
        bindings:
          - exchange: capacity.events
            routingPatterns:
              - 'capacity.#'
        deadLetterExchange: tourism.dlx
        retryQueue:
          name: payload.capacity.queue.retry
          ttl: 30000
          deadLetterExchange: capacity.events
          deadLetterRoutingKey: payload.capacity.queue
        dlq: payload.capacity.queue.dlq
        consumer: Payload CMS (Capacity Handler)

  # ── ISR Revalidation Map Extension ─────────────────────────────────
  x-isr-revalidation-map:
    description: |
      Maps each Payload CMS collection to the paths and tags
      that are revalidated when content changes.
    collections:
      tours:
        paths:
          - '/pe/tours/{slug}'
          - '/pe/tours'
          - '/pe/categorias'
          - '/pe/destinos'
        tags:
          - tours-sitemap
          - tours
        globals:
          - TourPage
      paquetes:
        paths:
          - '/pe/paquetes/{slug}'
          - '/pe/paquetes'
          - '/pe/destinos'
        tags:
          - packages-sitemap
          - packages
        globals:
          - PaquetePage
      post:
        paths:
          - '/pe/posts/{slug}'
          - '/pe/posts'
          - '/pe/categorias'
        tags:
          - posts-sitemap
          - posts
        globals:
          - BlogPage
      destinations:
        paths:
          - '/pe/destino'
          - '/pe'
        tags:
          - destinations
      pages:
        paths:
          - '/pe/{slug}'
          - '/pe'
        tags:
          - pages-sitemap
    globals:
      Footer:
        tags:
          - global_footer
      RedesNegocio:
        tags:
          - global_redesNegocio
      TourPage:
        tags:
          - tours
      PaquetePage:
        tags:
          - packages
      BlogPage:
        tags:
          - posts
