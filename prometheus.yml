global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'quarkus-app'
    metrics_path: '/q/metrics'
    static_configs:
      - targets: ['172.17.0.1:8081']
        labels:
          app: 'quarkus-user-bc'

  - job_name: 'cms-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['172.17.0.1:9464']
        labels:
          app: 'tourism-events-cms'

  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
