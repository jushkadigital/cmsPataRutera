version: '3'
services:
  
  postgres:
    restart: always
    image: postgres:18
    healthcheck:
      test: >
        CMD-SHELL
        pg_isready -U postgres -d payload &&
        psql -U postgres -d payload
        -tAc "SELECT 1 FROM __restore_healthcheck LIMIT 1;" | grep -q 1
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql
      - ./db/backup_20260123_041220.dump:/dump/backup_20260123_041220.dump:ro
      - ./db/restore.sh:/docker-entrypoint-initdb.d/restore.sh:ro

    #ports:
    #  - '5432:5432'
    environment:
      POSTGRES_DB: payload
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
    networks:
      # Conecta el servicio postgres a la nueva red interna para comunicarse con la aplicación
      - db_network

  payload:
    image: urgosxd7/payload-cms:latest
    #ports:
    #  - '3000:3000'
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      # Conecta el servicio payloaubd a la red externa para comunicarse con el proxy
      - proxiable
      # Conecta el servicio payload a la nueva red interna para comunicarse con la base de datos
      - db_network
  
volumes:
  pgdata:

networks:
  # Define la red externa existente para la comunicación con el proxy
  proxiable:
    external: true
    name: proxiable # Asegúrate de que este nombre coincida exactamente con tu red externa

  # Define una nueva red bridge interna para la comunicación entre la aplicación y la base de datos
  db_network:
    driver: bridge
    # Docker Compose creará y gestionará esta red automáticamente
