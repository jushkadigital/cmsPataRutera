version: '3'

services:
  payload:
    # Shell container for the devcontainer workspace.
    container_name: cms-payload
    image: ubuntu:24.04
    init: true
    volumes:
      - .:/workspace:cached
      # OpenCode session data persistence (SQLite DB, auth, logs)
      - opencode-data:/home/ubuntu/.local/share/opencode
      # OpenCode config persistence (opencode.jsonc, oh-my-openagent.json, plugins)
      - opencode-config:/home/ubuntu/.config/opencode
      # OpenCode cache (models, bins - avoids re-downloading ~2MB each time)
      - opencode-cache:/home/ubuntu/.cache/opencode
    working_dir: /workspace
    # Keep the workspace container alive for the editor/CLI session.
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3001:3000'
      - '9464:9464'
    networks:
      - default
      - observability

  postgres:
    restart: always
    image: postgres:18
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: payload
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d payload']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  opencode-data:
  opencode-config:
  opencode-cache:

networks:
  observability:
    external: true
    name: observability-net
